<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT-DLP Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }
    h1 span { color: #ff4545; }

    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 32px; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 20px;
    }

    .url-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"], select {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      padding: 10px 14px;
      font-size: 0.95rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus { border-color: #ff4545; }

    button {
      background: #ff4545;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    button:hover { background: #e03030; }
    button:disabled { background: #555; cursor: not-allowed; }

    .btn-secondary {
      background: #2a2a2a;
      color: #e8e8e8;
    }
    .btn-secondary:hover { background: #333; }

    .preview {
      display: none;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #2a2a2a;
    }
    .preview img {
      width: 120px;
      height: 68px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .preview-info { flex: 1; min-width: 0; }
    .preview-title {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-dur { color: #888; font-size: 0.82rem; margin-top: 4px; }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 20px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.82rem; color: #aaa; font-weight: 500; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }
    .toggle-label { font-size: 0.9rem; color: #ccc; }

    .switch {
      position: relative; display: inline-block;
      width: 42px; height: 24px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #333; border-radius: 24px;
      transition: 0.3s;
    }
    .slider::before {
      content: ""; position: absolute;
      width: 18px; height: 18px;
      left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #ff4545; }
    input:checked + .slider::before { transform: translateX(18px); }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .action-row button { flex: 1; padding: 12px; font-size: 1rem; }

    .log-box {
      display: none;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 0.8rem;
      color: #aaa;
      max-height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 16px;
    }
    .log-line { line-height: 1.5; }
    .log-line.done { color: #4caf50; font-weight: bold; }
    .log-line.error { color: #f44336; font-weight: bold; }

    .files-card { display: none; }
    .files-list { list-style: none; margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #111; border: 1px solid #2a2a2a; border-radius: 8px;
      padding: 10px 14px;
    }
    .file-name { font-size: 0.88rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 380px; }
    .file-size { color: #666; font-size: 0.78rem; margin-left: 8px; flex-shrink: 0; }
    .file-dl { font-size: 0.82rem; }

    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-left: 8px;
    }
    .badge-ok { background: #1a3a1a; color: #4caf50; }
    .badge-err { background: #3a1a1a; color: #f44336; }
    .badge-running { background: #2a2a00; color: #ffcc00; }

    .section-title {
      font-size: 0.82rem; color: #aaa; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    @media (max-width: 480px) {
      .options-grid { grid-template-columns: 1fr; }
      .url-row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <h1><span>YT</span>-DLP Downloader</h1>
  <p class="subtitle">Download videos & audio from YouTube and 1000+ sites</p>

  <!-- Main card -->
  <div class="card">
    <div class="section-title">Video URL</div>
    <div class="url-row">
      <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
      <button id="fetchBtn" onclick="fetchInfo()">Fetch</button>
    </div>

    <!-- Preview -->
    <div class="preview" id="preview">
      <img id="thumb" src="" alt="thumbnail" />
      <div class="preview-info">
        <div class="preview-title" id="vidTitle"></div>
        <div class="preview-dur" id="vidDur"></div>
      </div>
    </div>

    <!-- Options -->
    <div class="options-grid" id="optionsGrid" style="display:none">
      <div class="field">
        <label>Quality</label>
        <select id="quality">
          <option value="best">Best available</option>
          <option value="1080">1080p</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
          <option value="360">360p</option>
        </select>
      </div>
      <div class="field" id="audioFmtField" style="display:none">
        <label>Audio Format</label>
        <select id="audioFormat">
          <option value="mp3">MP3</option>
          <option value="aac">AAC</option>
          <option value="flac">FLAC</option>
          <option value="wav">WAV</option>
          <option value="opus">Opus</option>
        </select>
      </div>
    </div>

    <div class="toggle-row" id="togglesRow" style="display:none">
      <label class="switch">
        <input type="checkbox" id="audioOnly" onchange="toggleAudioOnly()" />
        <span class="slider"></span>
      </label>
      <span class="toggle-label">Audio only</span>

      <label class="switch" style="margin-left:16px">
        <input type="checkbox" id="subtitles" />
        <span class="slider"></span>
      </label>
      <span class="toggle-label">Subtitles (EN)</span>
    </div>

    <div class="action-row" id="actionRow" style="display:none">
      <button onclick="startDownload()">Download</button>
      <button class="btn-secondary" onclick="reset()">Reset</button>
    </div>

    <!-- Log -->
    <div class="log-box" id="logBox"></div>
  </div>

  <!-- Downloads list -->
  <div class="card files-card" id="filesCard">
    <div class="section-title">Downloaded Files</div>
    <ul class="files-list" id="filesList"></ul>
  </div>

  <script>
    let videoInfo = null;

    async function fetchInfo() {
      const url = document.getElementById("urlInput").value.trim();
      if (!url) return;

      const btn = document.getElementById("fetchBtn");
      btn.disabled = true;
      btn.textContent = "Fetching...";
      clearLog();

      try {
        const res = await fetch("/formats", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (data.error) { showLog(`ERROR: ${data.error}`, "error"); return; }

        videoInfo = data;
        document.getElementById("thumb").src = data.thumbnail;
        document.getElementById("vidTitle").textContent = data.title;
        document.getElementById("vidDur").textContent = data.duration ? `Duration: ${data.duration}` : "";
        document.getElementById("preview").style.display = "flex";
        document.getElementById("optionsGrid").style.display = "grid";
        document.getElementById("togglesRow").style.display = "flex";
        document.getElementById("actionRow").style.display = "flex";
      } catch (e) {
        showLog(`ERROR: ${e.message}`, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Fetch";
      }
    }

    function toggleAudioOnly() {
      const on = document.getElementById("audioOnly").checked;
      document.getElementById("quality").parentElement.style.display = on ? "none" : "flex";
      document.getElementById("audioFmtField").style.display = on ? "flex" : "none";
    }

    async function startDownload() {
      const url = document.getElementById("urlInput").value.trim();
      if (!url) return;

      const payload = {
        url,
        audio_only: document.getElementById("audioOnly").checked,
        audio_format: document.getElementById("audioFormat").value,
        quality: document.getElementById("quality").value,
        subtitles: document.getElementById("subtitles").checked,
        sub_lang: "en"
      };

      const logBox = document.getElementById("logBox");
      logBox.style.display = "block";
      logBox.innerHTML = "";

      document.querySelectorAll(".action-row button").forEach(b => b.disabled = true);

      const res = await fetch("/download", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split("\n\n");
        buf = parts.pop();
        for (const part of parts) {
          if (part.startsWith("data: ")) {
            const line = part.slice(6).trim();
            if (line === "DONE") {
              appendLog("Download complete!", "done");
              loadFiles();
            } else if (line.startsWith("ERROR:")) {
              appendLog(line, "error");
            } else {
              appendLog(line, "");
            }
          }
        }
      }

      document.querySelectorAll(".action-row button").forEach(b => b.disabled = false);
    }

    function appendLog(text, cls) {
      const logBox = document.getElementById("logBox");
      const div = document.createElement("div");
      div.className = `log-line ${cls}`;
      div.textContent = text;
      logBox.appendChild(div);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function showLog(text, cls) {
      const logBox = document.getElementById("logBox");
      logBox.style.display = "block";
      logBox.innerHTML = "";
      appendLog(text, cls);
    }

    function clearLog() {
      const logBox = document.getElementById("logBox");
      logBox.style.display = "none";
      logBox.innerHTML = "";
    }

    function reset() {
      document.getElementById("urlInput").value = "";
      document.getElementById("preview").style.display = "none";
      document.getElementById("optionsGrid").style.display = "none";
      document.getElementById("togglesRow").style.display = "none";
      document.getElementById("actionRow").style.display = "none";
      document.getElementById("audioOnly").checked = false;
      document.getElementById("subtitles").checked = false;
      document.getElementById("quality").value = "best";
      document.getElementById("audioFmtField").style.display = "none";
      document.getElementById("quality").parentElement.style.display = "flex";
      clearLog();
      videoInfo = null;
    }

    function fmt(bytes) {
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    async function loadFiles() {
      const res = await fetch("/list-downloads");
      const files = await res.json();
      const card = document.getElementById("filesCard");
      const list = document.getElementById("filesList");
      list.innerHTML = "";
      if (files.length === 0) { card.style.display = "none"; return; }
      card.style.display = "block";
      files.forEach(f => {
        const li = document.createElement("li");
        li.className = "file-item";
        li.innerHTML = `
          <span class="file-name" title="${f.name}">${f.name}</span>
          <span class="file-size">${fmt(f.size)}</span>
          <a class="file-dl" href="/downloads/${encodeURIComponent(f.name)}">Download</a>
        `;
        list.appendChild(li);
      });
    }

    // Load existing files on page load
    loadFiles();

    // Allow Enter key to trigger fetch
    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") fetchInfo();
    });
  </script>
</body>
</html>
